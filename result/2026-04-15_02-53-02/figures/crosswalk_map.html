<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>중구 스마트 횡단보도 후보 지도</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>#map { height: 92vh; } body { margin: 0; font-family: sans-serif; }</style>
</head>
<body>
<div id="map"></div>
<script>
const map = L.map('map').setView([37.55442692511792, 126.97333207568764], 14);
L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);
const markers = [{"횡단보도ID": 23040, "lat": 37.55442692511792, "lon": 126.97333207568764, "risk_score": 6.701991313611407}];
for (const item of markers) {
  L.circleMarker([item.lat, item.lon], {radius: 6, color: '#b30000'})
    .bindPopup(`횡단보도ID: ${item["횡단보도ID"]}<br>risk_score: ${Number(item.risk_score).toFixed(3)}`)
    .addTo(map);
}
</script>
</body>
</html>
